name: Build and Release UIU Ping

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node packages
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true
          
      - name: Prebuild Expo Android Project
        run: npx expo prebuild --platform android --no-install

      - name: Build Android Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -Dnodejs.executable="$(which node)"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: UIU-Ping-Android-APK
          path: android/app/build/outputs/apk/release/*.apk

  build-ios:
    name: Build iOS App
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Verify Xcode & Swift
        run: |
          xcodebuild -version
          swift --version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node packages
        run: npm ci

      - name: Prebuild Expo iOS Project
        run: npx expo prebuild --platform ios --no-install

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Compile Xcode iOS App Bundle
        run: |
          cd ios
          # Extract dynamic scheme name from xcworkspace file
          WORKSPACE_FILE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME_NAME="${WORKSPACE_FILE%.xcworkspace}"
          echo "Workspace found: $WORKSPACE_FILE"
          echo "Scheme resolved: $SCHEME_NAME"
          
          xcodebuild -workspace "$WORKSPACE_FILE" \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Package iOS App Bundle
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          cp -r *.app Payload/
          zip -r UIU-Ping-iOS.ipa Payload

      - name: Upload iOS App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: UIU-Ping-iOS-App
          path: ios/build/Build/Products/Release-iphoneos/UIU-Ping-iOS.ipa

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: UIU-Ping-Android-APK
          path: ./release-assets

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: UIU-Ping-iOS-App
          path: ./release-assets

      - name: Rename Android APK for Release
        run: |
          cd release-assets
          mv *.apk UIU-Ping-Android.apk || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            release-assets/UIU-Ping-Android.apk
            release-assets/UIU-Ping-iOS.ipa
          body: |
            Automated build release for UIU Ping.
            
            ### Downloads
            - **Android (Installable APK)**: [UIU-Ping-Android.apk](https://github.com/${{ github.repository }}/releases/download/v1.0.${{ github.run_number }}/UIU-Ping-Android.apk)
            - **iOS (Installable IPA)**: [UIU-Ping-iOS.ipa](https://github.com/${{ github.repository }}/releases/download/v1.0.${{ github.run_number }}/UIU-Ping-iOS.ipa)
            
            *Compiled automatically on commit: `${{ github.sha }}`*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
