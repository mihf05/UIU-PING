name: Build and Release UIU Ping

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Node packages
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild Expo Android Project
        run: npx expo prebuild --platform android --no-install

      - name: Build Android Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: UIU-Ping-Android-APK
          path: android/app/build/outputs/apk/release/*.apk

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Node packages
        run: npm ci

      - name: Prebuild Expo iOS Project
        run: npx expo prebuild --platform ios --no-install

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Compile Xcode iOS App Bundle
        run: |
          cd ios
          # Compile scheme matching project output path dynamically without signing credentials
          xcodebuild -workspace *.xcworkspace \
                     -scheme * \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Package iOS App Bundle
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          zip -r UIU-Ping-iOS.app.zip *.app

      - name: Upload iOS App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: UIU-Ping-iOS-App
          path: ios/build/Build/Products/Release-iphoneos/UIU-Ping-iOS.app.zip
